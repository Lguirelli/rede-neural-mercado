<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo Quant Glass | IA de Mercado</title>
  <style>
    :root {
      --bg: #050812;
      --bg-2: #0b1020;
      --glass: rgba(255,255,255,.075);
      --glass-2: rgba(255,255,255,.11);
      --line: rgba(255,255,255,.14);
      --text: #eef6ff;
      --muted: #8fa2b8;
      --blue: #3b82f6;
      --cyan: #00e5ff;
      --green: #00ffb2;
      --red: #ff4d6d;
      --yellow: #ffd166;
      --radius: 28px;
      --shadow: 0 28px 80px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(0,229,255,.22), transparent 32%),
        radial-gradient(circle at 90% 20%, rgba(59,130,246,.20), transparent 30%),
        radial-gradient(circle at 60% 100%, rgba(0,255,178,.12), transparent 36%),
        linear-gradient(135deg, #030611, #0b1020 46%, #050812);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 54px 54px;
      mask-image: radial-gradient(circle at center, black, transparent 75%);
      pointer-events: none;
    }

    .app {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: radial-gradient(circle at 30% 20%, #fff, var(--cyan) 20%, var(--blue) 70%);
      box-shadow: 0 0 35px rgba(0,229,255,.55);
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(28px, 4vw, 54px);
      letter-spacing: -2px;
      line-height: .95;
    }

    h2 {
      font-size: clamp(24px, 3vw, 42px);
      letter-spacing: -1.4px;
    }

    h3 {
      font-size: 18px;
      letter-spacing: -.4px;
    }

    p {
      color: var(--muted);
      line-height: 1.55;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.07);
      padding: 10px 14px;
      border-radius: 999px;
      color: #d8e8ff;
      backdrop-filter: blur(18px);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      gap: 22px;
      align-items: start;
    }

    .glass {
      border: 1px solid var(--line);
      background: linear-gradient(145deg, rgba(255,255,255,.13), rgba(255,255,255,.045));
      backdrop-filter: blur(26px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .glass::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,.22), transparent 26%, transparent 70%, rgba(0,229,255,.08));
      pointer-events: none;
    }

    .sidebar, .rightbar {
      padding: 20px;
      min-height: 760px;
    }

    .main {
      display: grid;
      gap: 22px;
    }

    .hero {
      padding: 28px;
      display: grid;
      grid-template-columns: 1.4fr .8fr;
      gap: 22px;
      align-items: center;
    }

    .hero-copy {
      display: grid;
      gap: 18px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .metric {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.10);
    }

    .metric strong {
      display: block;
      font-size: 24px;
      margin-top: 6px;
    }

    .nav {
      display: grid;
      gap: 10px;
      margin-top: 24px;
    }

    .nav button, .button {
      width: 100%;
      border: 0;
      color: var(--text);
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      padding: 13px 14px;
      border-radius: 18px;
      cursor: pointer;
      text-align: left;
      transition: .25s ease;
    }

    .nav button:hover, .button:hover {
      transform: translateY(-2px);
      background: rgba(59,130,246,.20);
      box-shadow: 0 0 22px rgba(59,130,246,.22);
    }

    .market-list, .alerts, .factor-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .market-item, .alert, .factor {
      padding: 14px;
      border-radius: 20px;
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(255,255,255,.10);
    }

    .market-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral { color: var(--yellow); }

    .stocks-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .stock-card {
      padding: 18px;
      border-radius: 26px;
      background: linear-gradient(145deg, rgba(255,255,255,.115), rgba(255,255,255,.045));
      border: 1px solid rgba(255,255,255,.13);
      box-shadow: 0 18px 50px rgba(0,0,0,.28);
      cursor: pointer;
      transition: .25s ease;
      position: relative;
      overflow: hidden;
    }

    .stock-card:hover {
      transform: translateY(-5px);
      border-color: rgba(0,229,255,.38);
      box-shadow: 0 0 35px rgba(0,229,255,.18), 0 20px 70px rgba(0,0,0,.42);
    }

    .stock-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 18px;
    }

    .ticker {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.8px;
    }

    .company {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .prediction {
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.08);
    }

    .price {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .mini-chart {
      height: 46px;
      border-radius: 14px;
      background:
        linear-gradient(90deg, transparent 0 10%, rgba(255,255,255,.07) 10% 11%, transparent 11% 22%, rgba(255,255,255,.07) 22% 23%, transparent 23%),
        linear-gradient(135deg, rgba(0,229,255,.10), rgba(59,130,246,.04));
      position: relative;
      overflow: hidden;
      margin: 14px 0;
    }

    .mini-chart svg {
      width: 100%;
      height: 100%;
    }

    .stock-bottom {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
    }

    .detail-header {
      padding: 28px;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 24px;
      align-items: center;
    }

    .ring {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin-left: auto;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.08) 0 48%, transparent 49%),
        conic-gradient(var(--cyan) 0deg, var(--blue) 270deg, rgba(255,255,255,.10) 270deg);
      box-shadow: 0 0 45px rgba(0,229,255,.35);
    }

    .ring-inner {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(5,8,18,.78);
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px solid rgba(255,255,255,.12);
    }

    .ring strong {
      display: block;
      font-size: 32px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 22px;
    }

    .panel {
      padding: 24px;
    }

    .big-chart {
      height: 300px;
      margin-top: 18px;
      border-radius: 24px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.09);
      overflow: hidden;
    }

    .big-chart svg {
      width: 100%;
      height: 100%;
    }

    .factor {
      display: grid;
      gap: 10px;
      cursor: pointer;
      transition: .25s ease;
    }

    .factor:hover {
      transform: translateY(-3px);
      background: rgba(0,229,255,.09);
    }

    .factor-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      border-radius: 999px;
    }

    .explain-page {
      padding: 32px;
      display: grid;
      gap: 24px;
    }

    .explain-body {
      display: grid;
      gap: 18px;
      max-width: 920px;
    }

    .back {
      display: inline-flex;
      width: fit-content;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 999px;
      cursor: pointer;
    }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar, .rightbar { min-height: auto; }
      .stocks-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 760px) {
      .app { padding: 14px; }
      .topbar, .hero, .detail-header, .detail-grid { grid-template-columns: 1fr; }
      .topbar { align-items: start; flex-direction: column; }
      .stocks-grid, .metrics { grid-template-columns: 1fr; }
      .ring { margin-left: 0; }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script>
    const stocks = [
      ["PETR4","Petrobras",38.42,"alta",2.35,78,"Médio"],
      ["VALE3","Vale",64.18,"queda",-1.12,71,"Médio"],
      ["ITUB4","Itaú Unibanco",33.91,"alta",1.48,74,"Baixo"],
      ["BBAS3","Banco do Brasil",28.73,"alta",1.91,76,"Médio"],
      ["BBDC4","Bradesco",14.22,"queda",-0.84,69,"Médio"],
      ["ABEV3","Ambev",12.41,"neutro",0.18,61,"Baixo"],
      ["MGLU3","Magazine Luiza",1.97,"alta",3.82,67,"Alto"],
      ["LREN3","Lojas Renner",16.83,"queda",-1.74,70,"Médio"],
      ["TOTS3","Totvs",31.56,"alta",2.06,75,"Médio"],
      ["ELET3","Eletrobras",43.12,"alta",1.22,72,"Médio"],
      ["RDOR3","Rede D'Or",27.44,"queda",-0.92,66,"Médio"],
      ["RADL3","Raia Drogasil",25.19,"alta",1.37,73,"Baixo"],
      ["CYRE3","Cyrela",21.88,"alta",2.74,68,"Alto"],
      ["RAIL3","Rumo",22.36,"neutro",0.31,63,"Médio"],
      ["SUZB3","Suzano",55.74,"queda",-1.46,72,"Médio"]
    ];

    const factors = [
      ["Preço histórico ajustado",31,"positivo","O comportamento recente indica recuperação após pressão vendedora."],
      ["Volume negociado",22,"positivo","O volume acima da média reforça a força do movimento previsto."],
      ["Indicadores macroeconômicos",18,"neutro","Dólar, juros e índice futuro mantêm influência moderada na previsão."],
      ["Gatilhos externos",15,"positivo","Notícias, comunicados oficiais e mercado internacional favoreceram o cenário."],
      ["Sentimento institucional",14,"positivo","A leitura agregada indica melhora gradual na percepção do ativo."]
    ];

    function getStock() {
      const hash = location.hash.replace("#", "");
      const parts = hash.split("/");
      const ticker = parts[1] || "";
      return stocks.find(s => s[0] === ticker) || stocks[0];
    }

    function go(path) {
      location.hash = path;
      render();
      scrollTo({ top: 0, behavior: "smooth" });
    }

    function cls(type) {
      if (type === "alta" || type === "positivo") return "positive";
      if (type === "queda" || type === "negativo") return "negative";
      return "neutral";
    }

    function spark(up = true) {
      const color = up ? "#00ffb2" : "#ff4d6d";
      const d = up
        ? "M0 34 C35 20, 54 36, 82 18 S135 30, 180 10"
        : "M0 12 C35 28, 54 14, 82 32 S135 20, 180 38";
      return `<svg viewBox="0 0 180 46" preserveAspectRatio="none">
        <path d="${d}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"/>
        <path d="${d} L180 46 L0 46 Z" fill="${color}" opacity=".08"/>
      </svg>`;
    }

    function shell(content) {
      return `
        <div class="app">
          <header class="topbar">
            <div class="brand">
              <div class="logo"></div>
              <div>
                <div class="chip">Rede neural em construção</div>
                <h1>Neo Quant Glass</h1>
              </div>
            </div>
            <div class="chip">Última atualização simulada: 10:45</div>
          </header>

          <section class="layout">
            <aside class="sidebar glass">
              <h3>Mercados globais</h3>
              <p>Dados simulados para visualização do produto final.</p>

              <div class="market-list">
                <div class="market-item"><span>Ibovespa</span><strong class="positive">+0,84%</strong></div>
                <div class="market-item"><span>Dólar</span><strong class="negative">-0,21%</strong></div>
                <div class="market-item"><span>S&P 500</span><strong class="positive">+0,36%</strong></div>
                <div class="market-item"><span>Nasdaq</span><strong class="positive">+0,58%</strong></div>
                <div class="market-item"><span>Petróleo</span><strong class="positive">+1,12%</strong></div>
                <div class="market-item"><span>Minério</span><strong class="negative">-0,76%</strong></div>
              </div>

              <nav class="nav">
                <button onclick="go('dashboard')">Dashboard geral</button>
                <button onclick="go('acao/PETR4')">Análise PETR4</button>
                <button onclick="go('acao/VALE3')">Análise VALE3</button>
                <button onclick="go('acao/ITUB4')">Análise ITUB4</button>
              </nav>
            </aside>

            <main class="main">${content}</main>

            <aside class="rightbar glass">
              <h3>Alertas da IA</h3>
              <p>Gatilhos identificados durante a leitura simulada das fontes.</p>

              <div class="alerts">
                <div class="alert">
                  <strong class="positive">Alta de commodities</strong>
                  <p>Petróleo e mercado externo favorecem ativos ligados a energia.</p>
                </div>
                <div class="alert">
                  <strong class="neutral">Volatilidade moderada</strong>
                  <p>O modelo detecta instabilidade em varejo e construção.</p>
                </div>
                <div class="alert">
                  <strong class="negative">Pressão em minério</strong>
                  <p>Queda no minério pesa sobre projeções de VALE3.</p>
                </div>
              </div>
            </aside>
          </section>
        </div>
      `;
    }

    function dashboard() {
      const cards = stocks.map(s => `
        <article class="stock-card" onclick="go('acao/${s[0]}')">
          <div class="stock-top">
            <div>
              <div class="ticker">${s[0]}</div>
              <div class="company">${s[1]}</div>
            </div>
            <div class="prediction ${cls(s[3])}">${s[3].toUpperCase()}</div>
          </div>
          <div class="price">R$ ${s[2].toFixed(2).replace(".", ",")}</div>
          <div class="${cls(s[3])}">${s[4] > 0 ? "+" : ""}${s[4].toFixed(2).replace(".", ",")}% previsto</div>
          <div class="mini-chart">${spark(s[4] >= 0)}</div>
          <div class="stock-bottom">
            <span>Confiança ${s[5]}%</span>
            <span>Risco ${s[6]}</span>
          </div>
          <button class="button" style="margin-top:14px;text-align:center" onclick="event.stopPropagation();go('acao/${s[0]}')">Análise detalhada</button>
        </article>
      `).join("");

      return shell(`
        <section class="hero glass">
          <div class="hero-copy">
            <h2>Visualizador preditivo de ações brasileiras</h2>
            <p>Placeholder visual da plataforma enquanto a rede neural está em desenvolvimento. Os números abaixo são simulados apenas para validar navegação, leitura e estrutura do produto.</p>
            <div class="metrics">
              <div class="metric"><p>Ações analisadas</p><strong>15</strong></div>
              <div class="metric"><p>Confiança média</p><strong>71%</strong></div>
              <div class="metric"><p>Horizonte</p><strong>1 pregão</strong></div>
            </div>
          </div>
          <div class="ring">
            <div class="ring-inner">
              <div><strong>71%</strong><p>score médio</p></div>
            </div>
          </div>
        </section>

        <section class="stocks-grid">${cards}</section>
      `);
    }

    function detail() {
      const s = getStock();

      const factorCards = factors.map((f, i) => `
        <div class="factor" onclick="go('explicacao/${s[0]}/${i}')">
          <div class="factor-head">
            <strong>${f[0]}</strong>
            <span class="${cls(f[2])}">${f[1]}%</span>
          </div>
          <div class="bar"><span style="width:${f[1]}%"></span></div>
          <p>${f[3]}</p>
          <span class="chip" style="width:fit-content">Abrir explicação completa</span>
        </div>
      `).join("");

      return shell(`
        <section class="detail-header glass">
          <div>
            <button class="back" onclick="go('dashboard')">Voltar ao dashboard</button>
            <br><br>
            <div class="chip">Análise detalhada</div>
            <h2>${s[0]} | ${s[1]}</h2>
            <p>A rede neural prevê <strong class="${cls(s[3])}">${s[3]}</strong> de ${s[4] > 0 ? "+" : ""}${s[4].toFixed(2).replace(".", ",")}% para o próximo período analisado. Esta tela mostra os principais blocos que influenciaram a previsão.</p>
          </div>
          <div class="ring">
            <div class="ring-inner">
              <div><strong>${s[5]}%</strong><p>confiança</p></div>
            </div>
          </div>
        </section>

        <section class="detail-grid">
          <div class="panel glass">
            <h3>Gráfico principal da previsão</h3>
            <p>Simulação visual do movimento esperado, combinando preço, volume, volatilidade e contexto externo.</p>
            <div class="big-chart">
              <svg viewBox="0 0 900 300" preserveAspectRatio="none">
                <defs>
                  <linearGradient id="g" x1="0" x2="1">
                    <stop offset="0%" stop-color="#00e5ff"/>
                    <stop offset="100%" stop-color="#3b82f6"/>
                  </linearGradient>
                </defs>
                <path d="M0 220 C90 180, 130 245, 210 190 S350 120, 430 150 S570 235, 650 130 S790 80, 900 100" fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round"/>
                <path d="M0 220 C90 180, 130 245, 210 190 S350 120, 430 150 S570 235, 650 130 S790 80, 900 100 L900 300 L0 300 Z" fill="#00e5ff" opacity=".08"/>
              </svg>
            </div>
          </div>

          <div class="panel glass">
            <h3>Principais explicações</h3>
            <p>Cada título abaixo abre uma terceira tela com explicação maior.</p>
            <div class="factor-list">${factorCards}</div>
          </div>
        </section>

        <section class="panel glass">
          <h3>Dados usados na leitura</h3>
          <p>Preço de abertura, fechamento, máxima, mínima, volume, retorno diário, volatilidade, médias móveis, preço corrigido por inflação, preço ajustado por proventos, Ibovespa, dólar, juros, IPCA, commodities, bolsas internacionais, notícias oficiais, comunicados da empresa e redes sociais oficiais.</p>
        </section>
      `);
    }

    function explanation() {
      const s = getStock();
      const hash = location.hash.replace("#", "");
      const parts = hash.split("/");
      const idx = Number(parts[2] || 0);
      const f = factors[idx] || factors[0];

      return shell(`
        <section class="explain-page glass">
          <button class="back" onclick="go('acao/${s[0]}')">Voltar para análise detalhada</button>

          <div>
            <div class="chip">Explicação completa</div>
            <h2>${f[0]} em ${s[0]}</h2>
            <p>Peso estimado na previsão: <strong class="${cls(f[2])}">${f[1]}%</strong></p>
          </div>

          <div class="explain-body">
            <h3>O que esse fator representa</h3>
            <p>Este bloco mostra como a rede neural interpreta uma parte específica dos dados antes de chegar à previsão final. No produto real, essa área será alimentada pelos dados tratados, corrigidos e validados da base histórica.</p>

            <h3>Como isso influenciou a previsão</h3>
            <p>${f[3]} Para ${s[0]}, esse fator ajudou o modelo a ajustar a leitura de tendência, risco e força do movimento esperado.</p>

            <h3>Por que isso importa</h3>
            <p>Uma previsão não deve mostrar apenas o resultado final. Ela precisa explicar quais variáveis pesaram mais, quais foram neutras e quais aumentaram o risco da leitura. Essa terceira tela existe para transformar a previsão em uma análise compreensível.</p>

            <h3>Como será no sistema final</h3>
            <p>Quando a rede neural estiver conectada, esta página poderá exibir séries históricas, exemplos parecidos encontrados no passado, fontes consultadas, peso estatístico, impacto positivo ou negativo e nível de confiança específico para este fator.</p>
          </div>
        </section>
      `);
    }

    function render() {
      const hash = location.hash || "#dashboard";

      if (hash.startsWith("#acao/")) {
        document.getElementById("app").innerHTML = detail();
        return;
      }

      if (hash.startsWith("#explicacao/")) {
        document.getElementById("app").innerHTML = explanation();
        return;
      }

      document.getElementById("app").innerHTML = dashboard();
    }

    window.addEventListener("hashchange", render);
    render();
  </script>
</body>
</html>
